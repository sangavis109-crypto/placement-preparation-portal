<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>
</head>

<body style="background: linear-gradient(to right, #dbeafe, #e0f7fa);
             font-family: Arial;
             text-align: center;">

    <div style="margin-top: 100px;">

        <div style="background-color: white;
                    width: 400px;
                    margin: auto;
                    padding: 40px;
                    border-radius: 20px;
                    box-shadow: 0px 0px 15px gray;">

            <h1 style="color: darkblue;">
                🔐 Student Login
            </h1>

            <p style="color: gray;">
                Login to continue your preparation 🚀
            </p>

            <input type="text"
               id="username"
               placeholder="Enter Username"
               style="width: 90%;
               padding: 12px;
               margin: 10px;
               border-radius: 10px;
               border: 1px solid gray;
               font-size: 16px;">

            <br>

            <input type="password"
                   id="password"
                   placeholder="Enter Password"
                   style="width: 90%;
                          padding: 12px;
                          margin: 10px;
                          border-radius: 10px;
                          border: 1px solid gray;
                          font-size: 16px;">

            <br><br>

            <button onclick="loginUser()"
               style="background-color: #2563eb;
               color: white;
               padding: 14px 30px;
               border: none;
               border-radius: 12px;
               font-size: 18px;">
               🚀 Login
            </button>
            <p id="errorMessage"
               style="color:red;
               font-weight:bold;">
            </p>
        </div>

    </div>
<script>

function loginUser(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username == "Sangavi" &&
password == "1234"){

localStorage.setItem("username", username);

window.location.href = "/dashboard";

}
else{

document.getElementById("errorMessage")
.innerHTML =
"❌ Invalid Username or Password";

}
}

</script>
</body>
</html>
