<!DOCTYPE html>
<html>

<head>
    <title>Project Completion</title>
</head>

<body style="background: linear-gradient(to right, #dbeafe, #e0f7fa);

<div style="margin-top:100px;">

<div style="background-color:white;

</h1>

<h2 id="studentName">

<script>

let score = localStorage.getItem("aptitudeScore");

"🎯 Aptitude Score: " + score;
